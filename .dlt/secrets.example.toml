# Template for .dlt/secrets.toml — copy and fill in:
#   cp .dlt/secrets.example.toml .dlt/secrets.toml
#
# Gitignored, never commit. In deployment, use the equivalent env vars
# instead (TOML path maps to __-separated uppercase), e.g.:
#   SOURCES__FILESYSTEM__CREDENTIALS__AWS_ACCESS_KEY_ID
#   SOURCES__FILESYSTEM__CREDENTIALS__AWS_SECRET_ACCESS_KEY
#   SOURCES__FILESYSTEM__CREDENTIALS__ENDPOINT_URL
#   DESTINATION__POSTGRES__CREDENTIALS__DATABASE
#   DESTINATION__POSTGRES__CREDENTIALS__USERNAME
#   DESTINATION__POSTGRES__CREDENTIALS__PASSWORD
#   DESTINATION__POSTGRES__CREDENTIALS__HOST
#   DESTINATION__POSTGRES__CREDENTIALS__PORT

[sources.filesystem.credentials]
# Read access into MinIO — use a scoped per-source MinIO user from the
# ingestion repo's setup (see evd-surveillance-scripts/docs), not the
# MinIO root user. Read-only is enough; this project never writes to MinIO.
aws_access_key_id = "mdharura-svc"
aws_secret_access_key = "REPLACE_ME"
endpoint_url = "http://localhost:9000"

[destination.postgres.credentials]
database = "evd_warehouse"
username = "postgres"
password = "REPLACE_ME"
host = "localhost"
port = 5432
