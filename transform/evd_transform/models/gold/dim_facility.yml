version: 2

models:
  - name: dim_facility
    description: Master facility dimension.

    columns:
      - name: facility_key
        description: Unique facility identifier (MFL code).
        tests:
          - unique
          - not_null

      - name: facility_name
        tests:
          - not_null

      - name: county

      - name: sub_county

      - name: ward