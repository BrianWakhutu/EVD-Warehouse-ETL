# Local dev Postgres only. Not a deployment config — see docs/deployment.md
# (once written) for how this joins the Ubuntu server's evd-net alongside
# the ingestion repo and MinIO.
services:
  postgres:
    image: postgres:16
    container_name: evd-warehouse-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-evd_warehouse}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - warehouse_pg_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  warehouse_pg_data:
